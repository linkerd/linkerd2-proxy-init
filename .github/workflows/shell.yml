name: Shell

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '**/*.sh'
      - .github/workflows/shellcheck.yml
      - justfile

jobs:
  sh-lint:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - uses: linkerd/dev/actions/setup-tools@v49
        with:
          version: v49
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - run: just sh-lint
